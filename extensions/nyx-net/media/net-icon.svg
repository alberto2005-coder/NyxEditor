<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="40" stroke="#00d4ff" stroke-width="2" stroke-dasharray="5 5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="50" r="20" stroke="#00d4ff" stroke-width="4" opacity="0.5">
    <animate attributeName="r" values="15;25;15" dur="2s" repeatCount="indefinite" />
  </circle>
  <path d="M50 20V50H80" stroke="#00d4ff" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite" />
  </path>
  <circle cx="50" cy="50" r="4" fill="#00d4ff" />
</svg>
